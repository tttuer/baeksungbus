name: Deploy to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NAMESPACE: baeksungbus
  API_IMAGE: tttuer/baeksungbus
  REMOTE_K8S_DIR: /tmp/baeksungbus-k8s-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Generate backend env file
        run: |
          printf '%s\n' "${{ secrets.ENV_VARS }}" > k8s/baeksungbus.env
          chmod 644 k8s/baeksungbus.env

      - name: Upload Kubernetes manifests to k3s server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: k8s/*
          target: ${{ env.REMOTE_K8S_DIR }}
          strip_components: 1

      - name: Apply manifests on k3s
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_DEPLOY_IMAGE: ${{ env.API_IMAGE }}:${{ github.sha }}
          REMOTE_K8S_DIR: ${{ env.REMOTE_K8S_DIR }}
          NAMESPACE: ${{ env.NAMESPACE }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: API_DEPLOY_IMAGE,REMOTE_K8S_DIR,NAMESPACE,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -eu

            echo "Applying namespace..."
            kubectl apply -f "$REMOTE_K8S_DIR/namespace.yaml"

            echo "Applying secret from GitHub Actions secrets..."
            kubectl create secret generic baeksungbus-secret \
              --namespace "$NAMESPACE" \
              --from-env-file="$REMOTE_K8S_DIR/baeksungbus.env" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Applying Docker Hub pull secret..."
            kubectl create secret docker-registry dockerhub-registry \
              --namespace "$NAMESPACE" \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username="$DOCKER_USERNAME" \
              --docker-password="$DOCKER_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Setting deployment images..."
            sed -i "s|ghcr.io/your-org/baeksungbus-api:latest|$API_DEPLOY_IMAGE|g" "$REMOTE_K8S_DIR/deploy.yaml"

            echo "Applying manifests..."
            kubectl apply -f "$REMOTE_K8S_DIR/configmap.yaml"
            kubectl apply -f "$REMOTE_K8S_DIR/mysql.yaml"

            echo "Waiting for MySQL..."
            kubectl rollout status statefulset/baeksungbus-mysql -n "$NAMESPACE" --timeout=180s

            echo "Running database migrations..."
            kubectl delete job baeksungbus-migrate -n "$NAMESPACE" --ignore-not-found
            cat <<EOF | kubectl apply -f -
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: baeksungbus-migrate
              namespace: $NAMESPACE
            spec:
              backoffLimit: 2
              template:
                spec:
                  imagePullSecrets:
                    - name: dockerhub-registry
                  restartPolicy: Never
                  containers:
                    - name: migrate
                      image: $API_DEPLOY_IMAGE
                      imagePullPolicy: IfNotPresent
                      command:
                        - /bin/sh
                        - -c
                      args:
                        - uv run alembic upgrade head
                      envFrom:
                        - configMapRef:
                            name: baeksungbus-config
                        - secretRef:
                            name: baeksungbus-secret
            EOF
            if ! kubectl wait --for=condition=complete job/baeksungbus-migrate -n "$NAMESPACE" --timeout=180s; then
              kubectl logs job/baeksungbus-migrate -n "$NAMESPACE" || true
              exit 1
            fi

            kubectl apply -f "$REMOTE_K8S_DIR/deploy.yaml"
            kubectl apply -f "$REMOTE_K8S_DIR/ingress.yaml"

            echo "Waiting for rollout..."
            kubectl rollout status deployment/baeksungbus-api -n "$NAMESPACE" --timeout=180s

            rm -rf "$REMOTE_K8S_DIR"
            echo "Deploy complete."

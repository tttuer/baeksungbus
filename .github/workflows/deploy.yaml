name: Deploy to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NAMESPACE: baeksungbus
  API_IMAGE: tttuer/baeksungbus
  REMOTE_K8S_DIR: /tmp/baeksungbus-k8s-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Upload Kubernetes manifests to k3s server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: k8s/*
          target: ${{ env.REMOTE_K8S_DIR }}
          strip_components: 1

      - name: Apply manifests on k3s
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_DEPLOY_IMAGE: ${{ env.API_IMAGE }}:${{ github.sha }}
          REMOTE_K8S_DIR: ${{ env.REMOTE_K8S_DIR }}
          NAMESPACE: ${{ env.NAMESPACE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MIDDLEWARE_SECRET: ${{ secrets.MIDDLEWARE_SECRET }}
          DOCS_ID: ${{ secrets.DOCS_ID }}
          DOCS_PASSWORD: ${{ secrets.DOCS_PASSWORD }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: API_DEPLOY_IMAGE,REMOTE_K8S_DIR,NAMESPACE,DB_USER,DB_PASSWORD,MYSQL_ROOT_PASSWORD,MIDDLEWARE_SECRET,DOCS_ID,DOCS_PASSWORD,EMAIL_USERNAME,EMAIL_PASSWORD,EMAIL_SERVER,EMAIL_PORT,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -eu

            echo "Applying namespace..."
            kubectl apply -f "$REMOTE_K8S_DIR/namespace.yaml"

            echo "Applying secret from GitHub Actions secrets..."
            kubectl create secret generic baeksungbus-secret \
              --namespace "$NAMESPACE" \
              --from-literal=DB_USER="$DB_USER" \
              --from-literal=DB_PASSWORD="$DB_PASSWORD" \
              --from-literal=MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
              --from-literal=MIDDLEWARE_SECRET="$MIDDLEWARE_SECRET" \
              --from-literal=DOCS_ID="$DOCS_ID" \
              --from-literal=DOCS_PASSWORD="$DOCS_PASSWORD" \
              --from-literal=EMAIL_USERNAME="$EMAIL_USERNAME" \
              --from-literal=EMAIL_PASSWORD="$EMAIL_PASSWORD" \
              --from-literal=EMAIL_SERVER="$EMAIL_SERVER" \
              --from-literal=EMAIL_PORT="$EMAIL_PORT" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Applying Docker Hub pull secret..."
            kubectl create secret docker-registry dockerhub-registry \
              --namespace "$NAMESPACE" \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username="$DOCKER_USERNAME" \
              --docker-password="$DOCKER_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Setting deployment images..."
            sed -i "s|ghcr.io/your-org/baeksungbus-api:latest|$API_DEPLOY_IMAGE|g" "$REMOTE_K8S_DIR/deploy.yaml"

            echo "Applying manifests..."
            kubectl apply -f "$REMOTE_K8S_DIR/configmap.yaml"
            kubectl apply -f "$REMOTE_K8S_DIR/mysql.yaml"
            kubectl apply -f "$REMOTE_K8S_DIR/deploy.yaml"
            kubectl apply -f "$REMOTE_K8S_DIR/ingress.yaml"

            echo "Waiting for rollout..."
            kubectl rollout status deployment/baeksungbus-api -n "$NAMESPACE" --timeout=180s

            rm -rf "$REMOTE_K8S_DIR"
            echo "Deploy complete."

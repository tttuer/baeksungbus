apiVersion: apps/v1
kind: Deployment
metadata:
  name: baeksungbus-api
  namespace: baeksungbus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baeksungbus-api
  template:
    metadata:
      labels:
        app: baeksungbus-api
    spec:
      imagePullSecrets:
        - name: dockerhub-registry
      containers:
        - name: api
          image: ghcr.io/your-org/baeksungbus-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: baeksungbus-config
            - secretRef:
                name: baeksungbus-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: baeksungbus-api
  namespace: baeksungbus
spec:
  type: ClusterIP
  selector:
    app: baeksungbus-api
  ports:
    - name: http
      port: 8000
      targetPort: http

apiVersion: v1
kind: Service
metadata:
  name: baeksungbus-mysql
  namespace: baeksungbus
spec:
  type: ClusterIP
  selector:
    app: baeksungbus-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: baeksungbus-mysql-init
  namespace: baeksungbus
data:
  init.sql: |
    -- Database schema is managed by Alembic migrations.
    -- The deploy workflow runs `uv run alembic upgrade head`.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: baeksungbus-mysql
  namespace: baeksungbus
spec:
  serviceName: baeksungbus-mysql
  replicas: 1
  selector:
    matchLabels:
      app: baeksungbus-mysql
  template:
    metadata:
      labels:
        app: baeksungbus-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_DATABASE
              value: baeksung
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: baeksungbus-secret
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baeksungbus-secret
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baeksungbus-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: mysql-init
          configMap:
            name: baeksungbus-mysql-init
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
